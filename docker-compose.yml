#Docker-compose.yml serve para definir, configurar e executar aplicações multi-contêineres

services:
  djangoapp:
    container_name: djangoapp1
    build:
      context: .
    ports:
      - 8000:8000
    volumes:
      - ./djangoapp:/djangoapp
      - ./data/web/static:/data/web/static/
      - ./data/web/media:/data/web/media/
    env_file:
      - ./dotenv_files/.env
    environment:
      - POSTGRES_HOST=postgres-universal
      - POSTGRES_PORT=5432
    networks:
      - global-database-net

networks:
  global-database-net:
    external: true
